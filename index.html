<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CALC PRO | Calculadora Profissional</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(135deg, #0a0e1a 0%, #0f1422 50%, #0a0e1a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 0;
      margin: 0;
    }

    body.light {
      background: linear-gradient(135deg, #d4dcec 0%, #e8edf5 50%, #d4dcec 100%);
    }

    body.light .calculator {
      background: rgba(245, 248, 255, 0.98);
    }

    body.light .display {
      background: #f0f4fa;
      border: 2px solid rgba(100, 100, 150, 0.2);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.03), 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    body.light .main-display {
      color: #1a6b3a;
      text-shadow: none;
      font-weight: 900;
    }

    body.light .expression {
      color: #e6762e;
    }

    body.light .history-line {
      background: rgba(100, 100, 150, 0.3);
    }

    body.light .btn-number {
      background: linear-gradient(145deg, #c8d0e0, #b8c0d0);
      color: #2a3050;
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.15);
    }
    
    body.light .btn-number:nth-child(6),
    body.light .btn-number:nth-child(8),
    body.light .btn-number:nth-child(12),
    body.light .btn-number:nth-child(14),
    body.light .btn-number:nth-child(17),
    body.light .btn-number:nth-child(19),
    body.light .btn-number:nth-child(22) {
      background: linear-gradient(145deg, #d8e0f0, #c8d0e0);
      color: #1a2050;
    }

    body.light .btn-memory {
      background: linear-gradient(145deg, #b8c0d0, #a8b0c0);
      color: #2a3050;
    }
    
    body.light .btn-memory:nth-child(3),
    body.light .btn-memory:nth-child(5) {
      background: linear-gradient(145deg, #c8d0e0, #b8c0d0);
    }

    body.light .btn-special {
      background: linear-gradient(145deg, #b0b8c8, #a0a8b8);
      color: #2a3050;
    }
    
    body.light .btn-special:nth-child(10),
    body.light .btn-special:nth-child(15),
    body.light .btn-special:nth-child(20),
    body.light .btn-special:nth-child(23) {
      background: linear-gradient(145deg, #c0c8d8, #b0b8c8);
    }

    body.light .btn-operator {
      background: linear-gradient(145deg, #9b7acf, #8b6cbf);
      color: #ffffff;
    }

    body.light .btn-equals {
      background: linear-gradient(145deg, #ff9c52, #f0883e);
      color: #ffffff;
    }

    body.light .btn-clear {
      background: linear-gradient(145deg, #ff6a4a, #f05a3a);
      color: #ffffff;
    }

    body.light .logo {
      color: #e6762e;
      background: rgba(230, 118, 46, 0.15);
    }

    body.light .clock {
      color: #5a6a9a;
      background: rgba(0, 0, 0, 0.1);
    }

    body.light .sound-toggle,
    body.light .theme-toggle,
    body.light .color-toggle,
    body.light .history-clear {
      background: rgba(90, 106, 154, 0.2);
      color: #5a6a9a;
    }

    body.light .memory-indicator {
      color: #e6762e;
    }

    body.light .history-item {
      background: rgba(90, 106, 154, 0.2);
      color: #2a3050;
    }
    
    body.light .history-item-last {
      background: #e6762e;
      color: #ffffff;
    }

    /* CORES DO DISPLAY PARA TEMA CLARO - SÓLIDAS E NÍTIDAS */
    body.light .main-display.color-green { color: #1a8f4a; text-shadow: none; }
    body.light .main-display.color-blue { color: #1a5faa; text-shadow: none; }
    body.light .main-display.color-cyan { color: #008888; text-shadow: none; }
    body.light .main-display.color-pink { color: #c04080; text-shadow: none; }
    body.light .main-display.color-yellow { color: #aa8822; text-shadow: none; }
    body.light .main-display.color-white { color: #2a3050; text-shadow: none; }

    /* CALCULADORA - TELA CHEIA */
    .calculator {
      width: 100%;
      height: 100vh;
      background: rgba(18, 22, 35, 0.92);
      backdrop-filter: blur(20px);
      padding: 24px 20px 28px;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    body.light .calculator {
      background: rgba(245, 248, 255, 0.95);
      backdrop-filter: blur(20px);
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #ff9f4a;
      background: rgba(255, 159, 74, 0.15);
      padding: 8px 16px;
      border-radius: 40px;
      font-family: 'Orbitron', monospace;
    }

    .header-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .clock {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: #8b9bff;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 14px;
      border-radius: 40px;
      letter-spacing: 2px;
    }

    .sound-toggle, .theme-toggle, .color-toggle, .history-clear {
      background: rgba(139, 155, 255, 0.2);
      border: none;
      border-radius: 40px;
      padding: 6px 12px;
      font-size: 0.9rem;
      cursor: pointer;
      color: #8b9bff;
      transition: all 0.2s;
    }

    .sound-toggle:active, .theme-toggle:active, .color-toggle:active, .history-clear:active {
      transform: scale(0.95);
    }

    /* DISPLAY */
    .display {
      background: #0a0e1a;
      border-radius: 32px;
      padding: 30px 25px;
      margin-bottom: 20px;
      border: 2px solid rgba(114, 137, 218, 0.4);
      box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.6), 0 5px 15px rgba(0, 0, 0, 0.2);
      flex-shrink: 0;
    }

    .expression {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 400;
      color: #ff9f4a;
      text-align: center;
      min-height: 24px;
      margin-bottom: 12px;
      white-space: nowrap;
      opacity: 0.8;
      letter-spacing: 1px;
      overflow-x: auto;
    }

    .display-screen {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      scrollbar-width: thin;
      min-height: 110px;
    }

    .main-display {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      color: #4aff9e;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 0 15px #4aff9e, 0 0 25px rgba(74, 255, 158, 0.6);
      letter-spacing: 2px;
      display: inline-block;
    }
    
    /* TAMANHOS DA FONTE */
    .font-size-1 { font-size: 4rem; }
    .font-size-2 { font-size: 3.6rem; }
    .font-size-3 { font-size: 3.2rem; }
    .font-size-4 { font-size: 2.8rem; }
    .font-size-5 { font-size: 2.4rem; }
    .font-size-6 { font-size: 2.1rem; }
    .font-size-7 { font-size: 1.8rem; }
    .font-size-8 { font-size: 1.5rem; }
    
    /* CORES DO DISPLAY PARA TEMA ESCURO */
    .main-display.color-green { color: #4aff9e; text-shadow: 0 0 15px #4aff9e, 0 0 25px rgba(74, 255, 158, 0.6); }
    .main-display.color-blue { color: #5ba9ff; text-shadow: 0 0 15px #5ba9ff, 0 0 25px rgba(91, 169, 255, 0.6); }
    .main-display.color-cyan { color: #00ffff; text-shadow: 0 0 15px #00ffff, 0 0 25px rgba(0, 255, 255, 0.6); }
    .main-display.color-pink { color: #ff69b4; text-shadow: 0 0 15px #ff69b4, 0 0 25px rgba(255, 105, 180, 0.6); }
    .main-display.color-yellow { color: #ffdd44; text-shadow: 0 0 15px #ffdd44, 0 0 25px rgba(255, 221, 68, 0.6); }
    .main-display.color-white { color: #ffffff; text-shadow: 0 0 15px #ffffff, 0 0 25px rgba(255, 255, 255, 0.4); }

    .display-screen::-webkit-scrollbar {
      height: 4px;
    }

    .display-screen::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .display-screen::-webkit-scrollbar-thumb {
      background: #4aff9e;
      border-radius: 10px;
    }

    .memory-indicator {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      color: #ff9f4a;
      margin-top: 10px;
      text-align: center;
      opacity: 0.8;
    }

    /* HISTÓRICO */
    .history-section {
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .history-line {
      height: 1px;
      background: rgba(114, 137, 218, 0.3);
      margin: 10px 0;
    }

    .history-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 8px 0;
      max-height: 100px;
      overflow-y: auto;
    }

    .history-container::-webkit-scrollbar {
      width: 3px;
    }

    .history-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .history-container::-webkit-scrollbar-thumb {
      background: #ff9f4a;
      border-radius: 10px;
    }

    .history-item {
      padding: 6px 14px;
      border-radius: 30px;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      background: rgba(255, 159, 74, 0.2);
      color: #ff9f4a;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      border: 1px solid rgba(255, 159, 74, 0.3);
    }

    .history-item-last {
      padding: 6px 14px;
      border-radius: 30px;
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      font-weight: 800;
      background: #ff9f4a;
      color: #0a0e1a;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      box-shadow: 0 0 8px rgba(255, 159, 74, 0.5);
      border: 1px solid rgba(255, 159, 74, 0.8);
    }

    .history-item:active, .history-item-last:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    /* BOTÕES */
    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-top: 4px;
      flex: 1;
      align-content: center;
    }

    button {
      padding: 22px 0;
      border: none;
      border-radius: 24px;
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.06s linear;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.3);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
    }

    .btn-number {
      background: linear-gradient(145deg, #2a3048, #1a1f35);
      color: #e0e4f0;
    }
    
    .btn-number:nth-child(6),
    .btn-number:nth-child(8),
    .btn-number:nth-child(12),
    .btn-number:nth-child(14),
    .btn-number:nth-child(17),
    .btn-number:nth-child(19),
    .btn-number:nth-child(22) {
      background: linear-gradient(145deg, #3a4268, #2a3050);
      color: #f0f4ff;
    }

    .btn-memory {
      background: linear-gradient(145deg, #232842, #181d35);
      color: #b8c4ff;
      font-size: 1rem;
    }
    
    .btn-memory:nth-child(3),
    .btn-memory:nth-child(5) {
      background: linear-gradient(145deg, #323a58, #222842);
      color: #c8d4ff;
    }

    .btn-special {
      background: linear-gradient(145deg, #2f3a5a, #1e2a48);
      color: #c4ceff;
    }
    
    .btn-special:nth-child(10),
    .btn-special:nth-child(15),
    .btn-special:nth-child(20),
    .btn-special:nth-child(23) {
      background: linear-gradient(145deg, #3a4868, #2a3858);
      color: #d4deff;
    }

    .btn-operator {
      background: linear-gradient(145deg, #7c5cbf, #6b4cb0);
      color: #ffffff;
    }
    
    .btn-equals {
      background: linear-gradient(145deg, #ff8c42, #e6762e);
      color: #ffffff;
    }

    .btn-clear {
      background: linear-gradient(145deg, #ff5a3a, #e64a2a);
      color: #ffffff;
    }

    @media (max-width: 550px) {
      .calculator { padding: 16px 14px 20px; }
      button { padding: 18px 0; font-size: 1.3rem; border-radius: 22px; }
      .btn-memory { font-size: 0.9rem; }
      .buttons { gap: 12px; }
      .display { padding: 24px 20px; }
      .display-screen { min-height: 95px; }
      .font-size-1 { font-size: 3.5rem; }
      .font-size-2 { font-size: 3.2rem; }
      .font-size-3 { font-size: 2.9rem; }
      .font-size-4 { font-size: 2.6rem; }
      .font-size-5 { font-size: 2.3rem; }
      .history-item, .history-item-last { font-size: 0.8rem; padding: 5px 12px; }
      .history-item-last { font-size: 0.85rem; }
    }

    @media (max-width: 450px) {
      .calculator { padding: 12px 12px 16px; }
      button { padding: 15px 0; font-size: 1.1rem; border-radius: 20px; }
      .btn-memory { font-size: 0.8rem; }
      .buttons { gap: 10px; }
      .display { padding: 20px 18px; }
      .display-screen { min-height: 85px; }
      .font-size-1 { font-size: 3rem; }
      .font-size-2 { font-size: 2.7rem; }
      .font-size-3 { font-size: 2.4rem; }
      .font-size-4 { font-size: 2.1rem; }
      .font-size-5 { font-size: 1.9rem; }
      .history-item, .history-item-last { font-size: 0.75rem; padding: 4px 10px; }
      .history-item-last { font-size: 0.8rem; }
      .logo { font-size: 0.85rem; padding: 6px 12px; }
      .clock { font-size: 0.85rem; padding: 5px 10px; }
      .sound-toggle, .theme-toggle, .color-toggle, .history-clear { padding: 5px 9px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="header">
    <span class="logo">⚡ CALC PRO</span>
    <div class="header-buttons">
      <span class="clock" id="clock">00:00</span>
      <button class="sound-toggle" id="soundToggleBtn">🔊</button>
      <button class="theme-toggle" id="themeToggleBtn">🌙</button>
      <button class="color-toggle" id="colorToggleBtn">🎨</button>
      <button class="history-clear" id="historyClearBtn">🗑</button>
    </div>
  </div>

  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="display-screen">
      <div class="main-display color-green" id="display">0</div>
    </div>
    <div class="memory-indicator" id="memoryIndicator"></div>
  </div>

  <div class="history-section">
    <div class="history-line"></div>
    <div class="history-container" id="historyContainer"></div>
    <div class="history-line"></div>
  </div>

  <div class="buttons">
    <button class="btn-clear" id="clearBtn">AC</button>
    <button class="btn-memory" id="memoryClearBtn">MC</button>
    <button class="btn-memory" id="memoryRecallBtn">MR</button>
    <button class="btn-memory" id="memoryAddBtn">M+</button>
    <button class="btn-memory" id="memorySubtractBtn">M-</button>
    
    <button class="btn-number" data-num="7">7</button>
    <button class="btn-number" data-num="8">8</button>
    <button class="btn-number" data-num="9">9</button>
    <button class="btn-operator" data-op="/">÷</button>
    <button class="btn-special" id="percentBtn">%</button>
    
    <button class="btn-number" data-num="4">4</button>
    <button class="btn-number" data-num="5">5</button>
    <button class="btn-number" data-num="6">6</button>
    <button class="btn-operator" data-op="*">×</button>
    <button class="btn-special" id="sqrtBtn">√</button>
    
    <button class="btn-number" data-num="1">1</button>
    <button class="btn-number" data-num="2">2</button>
    <button class="btn-number" data-num="3">3</button>
    <button class="btn-operator" data-op="-">−</button>
    <button class="btn-special" id="toggleSignBtn">+/−</button>
    
    <button class="btn-number" data-num="0">0</button>
    <button class="btn-number" data-num=".">.</button>
    <button class="btn-special" id="backspaceBtn">⌫</button>
    <button class="btn-operator" data-op="+">+</button>
    <button class="btn-equals" id="equalBtn">=</button>
  </div>
</div>

<script>
  // ==================== LÓGICA DA CALCULADORA ====================
  const displayEl = document.getElementById('display');
  const expressionEl = document.getElementById('expression');
  const memoryIndicator = document.getElementById('memoryIndicator');
  const historyContainer = document.getElementById('historyContainer');

  let current = "0";
  let previous = null;
  let operator = null;
  let waitingNext = false;
  let memory = 0;
  let sound = true;
  let colorIndex = 0;
  
  let historyList = [];
  
  const colors = ['color-green', 'color-blue', 'color-cyan', 'color-pink', 'color-yellow', 'color-white'];
  const colorNames = ['🟢', '🔵', '💎', '🌸', '⭐', '⚪'];

  function formatNumber(numStr) {
    if (numStr === "Erro") return "Erro";
    if (numStr === "0") return "0";
    
    let isNegative = numStr.startsWith('-');
    let absStr = isNegative ? numStr.substring(1) : numStr;
    
    let hasDecimal = absStr.includes('.');
    let integerPart = hasDecimal ? absStr.split('.')[0] : absStr;
    let decimalPart = hasDecimal ? absStr.split('.')[1] : '';
    
    if (integerPart.length > 12) {
      integerPart = integerPart.substring(0, 12);
    }
    
    let formattedInteger = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    
    let result = formattedInteger;
    if (hasDecimal && decimalPart.length > 0) {
      let maxDecimals = Math.min(decimalPart.length, 4);
      result = formattedInteger + "," + decimalPart.substring(0, maxDecimals);
    }
    
    if (isNegative) result = "-" + result;
    
    return result;
  }

  function updateDisplay() {
    let formatted = formatNumber(current);
    displayEl.innerText = formatted;
    memoryIndicator.innerText = memory !== 0 ? 'M' : '';
    adjustFontSize();
    
    setTimeout(() => {
      const container = document.querySelector('.display-screen');
      if (container && displayEl.scrollWidth > container.clientWidth) {
        container.scrollLeft = displayEl.scrollWidth;
      }
    }, 10);
  }

  function adjustFontSize() {
    const textLength = displayEl.innerText.length;
    displayEl.classList.remove('font-size-1', 'font-size-2', 'font-size-3', 'font-size-4', 'font-size-5', 'font-size-6', 'font-size-7', 'font-size-8');
    
    if (textLength <= 8) displayEl.classList.add('font-size-1');
    else if (textLength <= 9) displayEl.classList.add('font-size-2');
    else if (textLength <= 10) displayEl.classList.add('font-size-3');
    else if (textLength <= 11) displayEl.classList.add('font-size-4');
    else if (textLength <= 12) displayEl.classList.add('font-size-5');
    else if (textLength <= 13) displayEl.classList.add('font-size-6');
    else if (textLength <= 15) displayEl.classList.add('font-size-7');
    else displayEl.classList.add('font-size-8');
  }

  function addToHistory(value) {
    let formattedValue = formatNumber(value.toString());
    historyList.unshift(formattedValue);
    if (historyList.length > 10) historyList.pop();
    renderHistory();
  }

  function renderHistory() {
    historyContainer.innerHTML = '';
    
    historyList.forEach((item, index) => {
      const historyItem = document.createElement('div');
      if (index === 0) {
        historyItem.className = 'history-item-last';
      } else {
        historyItem.className = 'history-item';
      }
      historyItem.innerText = item;
      historyItem.onclick = () => {
        current = item.replace(/\./g, '').replace(',', '.');
        waitingNext = true;
        updateDisplay();
        beep();
      };
      historyContainer.appendChild(historyItem);
    });
  }

  function clearHistory() {
    historyList = [];
    renderHistory();
    beep();
  }

  function inputNumber(num) {
    if (waitingNext) {
      current = "" + num;
      waitingNext = false;
    } else {
      let digitCount = current.replace('-', '').replace('.', '').length;
      if (digitCount >= 12) {
        beep();
        return;
      }
      current = current === "0" ? "" + num : current + num;
    }
    beep();
    updateDisplay();
  }

  function inputDot() {
    if (waitingNext) {
      current = "0.";
      waitingNext = false;
    } else if (!current.includes(".")) {
      current += ".";
    }
    updateDisplay();
  }

  function handleOperator(op) {
    const value = parseFloat(current);

    if (previous !== null && operator && !waitingNext) {
      calculate();
    } else {
      previous = value;
    }

    operator = op;
    waitingNext = true;
    
    let opSymbol = op === '*' ? '×' : op === '/' ? '÷' : op;
    expressionEl.innerText = formatNumber(previous.toString()) + " " + opSymbol;
  }

  function calculate() {
    if (operator === null || previous === null) return;

    const currentValue = parseFloat(current);
    let result = 0;

    switch (operator) {
      case "+": result = previous + currentValue; break;
      case "-": result = previous - currentValue; break;
      case "*": result = previous * currentValue; break;
      case "/": result = currentValue === 0 ? 0 : previous / currentValue; break;
    }

    result = parseFloat(result.toFixed(10));
    
    addToHistory(result);
    
    current = result.toString();
    previous = result;
    operator = null;
    waitingNext = true;

    updateDisplay();
    expressionEl.innerText = "";
  }

  function handleEqual() {
    if (operator === null || waitingNext) return;
    calculate();
  }

  function handlePercent() {
    if (previous === null) return;
    let percentValue = (previous * parseFloat(current)) / 100;
    current = percentValue.toString();
    updateDisplay();
    calculate();
  }

  function clearAll() {
    current = "0";
    previous = null;
    operator = null;
    waitingNext = false;
    expressionEl.innerText = "";
    updateDisplay();
    beep();
  }

  function backspace() {
    if (waitingNext) return;
    current = current.slice(0, -1) || "0";
    updateDisplay();
    beep();
  }

  function invert() {
    current = (parseFloat(current) * -1).toString();
    updateDisplay();
    beep();
  }

  function sqrt() {
    current = Math.sqrt(parseFloat(current)).toString();
    updateDisplay();
    beep();
  }

  function memoryAdd() { memory += parseFloat(current); updateDisplay(); beep(); }
  function memorySub() { memory -= parseFloat(current); updateDisplay(); beep(); }
  function memoryRecall() { current = memory.toString(); waitingNext = true; updateDisplay(); beep(); }
  function memoryClear() { memory = 0; updateDisplay(); beep(); }

  let audioCtx = null;
  function beep() {
    if (!sound) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.12;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);
      osc.stop(audioCtx.currentTime + 0.12);
    } catch(e) {}
  }

  function toggleSound() {
    sound = !sound;
    document.getElementById('soundToggleBtn').innerText = sound ? '🔊' : '🔇';
  }

  function toggleTheme() {
    document.body.classList.toggle('light');
    const themeBtn = document.getElementById('themeToggleBtn');
    themeBtn.innerHTML = document.body.classList.contains('light') ? '☀️' : '🌙';
  }

  function toggleColor() {
    colorIndex = (colorIndex + 1) % colors.length;
    displayEl.classList.remove('color-green', 'color-blue', 'color-cyan', 'color-pink', 'color-yellow', 'color-white');
    displayEl.classList.add(colors[colorIndex]);
    document.getElementById('colorToggleBtn').innerHTML = colorNames[colorIndex];
    beep();
  }

  function startClock() {
    const clockEl = document.getElementById('clock');
    setInterval(() => {
      const now = new Date();
      clockEl.innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }, 1000);
  }

  // EVENTOS
  document.querySelectorAll('.btn-number[data-num]').forEach(btn => {
    if (btn.dataset.num && btn.dataset.num !== '.') {
      btn.onclick = () => inputNumber(parseInt(btn.dataset.num));
    }
  });
  
  document.querySelectorAll('.btn-operator[data-op]').forEach(btn => {
    btn.onclick = () => handleOperator(btn.dataset.op);
  });
  
  document.getElementById('equalBtn').onclick = handleEqual;
  document.getElementById('percentBtn').onclick = handlePercent;
  document.getElementById('clearBtn').onclick = clearAll;
  document.getElementById('backspaceBtn').onclick = backspace;
  document.getElementById('sqrtBtn').onclick = sqrt;
  document.getElementById('toggleSignBtn').onclick = invert;
  
  document.getElementById('memoryAddBtn').onclick = memoryAdd;
  document.getElementById('memorySubtractBtn').onclick = memorySub;
  document.getElementById('memoryRecallBtn').onclick = memoryRecall;
  document.getElementById('memoryClearBtn').onclick = memoryClear;
  
  document.getElementById('soundToggleBtn').onclick = toggleSound;
  document.getElementById('themeToggleBtn').onclick = toggleTheme;
  document.getElementById('colorToggleBtn').onclick = toggleColor;
  document.getElementById('historyClearBtn').onclick = clearHistory;
  
  document.querySelectorAll('.btn-number[data-num="."]').forEach(btn => {
    btn.onclick = inputDot;
  });

  startClock();
  updateDisplay();
</script>
</body>
</html>
