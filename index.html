<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Calc Pro</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --btn:#334155;
  --op:#7c3aed;
  --equal:#fb923c;
  --history-bg:#0f172a;
}

.light{
  --bg:#f1f5f9;
  --text:#0f172a;
  --btn:#e2e8f0;
  --history-bg:#f1f5f9;
}

body{
  margin:0;
  background:var(--bg);
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  transition: background 0.3s;
}

.calc{
  width:360px;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.nexus-title{
  font-size:18px;
  font-weight:bold;
  color:var(--text);
}

.current-time{
  font-size:14px;
  color:var(--text);
  background:rgba(255,255,255,0.1);
  padding:6px 12px;
  border-radius:20px;
  font-family:monospace;
}

.top-actions{
  display:flex;
  gap:10px;
}

.top-actions button{
  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  background:var(--btn);
  color:var(--text);
  cursor:pointer;
  transition: all 0.2s;
  font-weight:bold;
  font-size:16px;
}

.top-actions button.sound-active{
  background:#22c55e;
  color:white;
}

.top-actions button.theme-active{
  background:#eab308;
  color:#0f172a;
}

.top-actions button.clear-active{
  background:#ef4444;
  color:white;
}

.top-actions button:hover{
  opacity:0.8;
  transform:scale(0.95);
}

.display{
  background:black;
  color:#60a5fa;
  font-size:48px;
  text-align:right;
  padding:30px 25px;  /* AUMENTADO: antes 25px, agora 30px */
  border-radius:20px;
  margin-bottom:15px;
  overflow-x:auto;
  white-space:nowrap;
  font-weight:bold;
  min-height:85px;    /* Garante altura extra */
  display:flex;
  align-items:center;
  justify-content:flex-end;
}

.divider{
  height:1px;
  background:rgba(255,255,255,0.1);
  margin:10px 0;
}

.history{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:10px;
  min-height:50px;
  align-items:center;
}

/* ESTILO PADRÃO DO HISTÓRICO (COR DO BOTÃO =) */
.history span{
  background:#fb923c;      /* Cor laranja do botão = */
  color:#0f172a;           /* Texto escuro para contraste */
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
  transition: all 0.2s;
  white-space:nowrap;
  font-weight:bold;
}

/* ÚLTIMO HISTÓRICO (DESTAQUE DIFERENTE) */
.history span:first-child {
  background:#22c55e;      /* Verde vibrante para destacar o último resultado */
  color:white;
  box-shadow:0 0 5px rgba(34,197,94,0.5);
}

/* Hover para qualquer item */
.history span:hover{
  opacity:0.8;
  transform:scale(1.02);
}

.buttons{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

button{
  height:65px;
  border:none;
  border-radius:50%;
  background:var(--btn);
  color:var(--text);
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition: all 0.1s;
}

button:active{
  transform:scale(0.95);
}

.op{background:var(--op);}
.equal{background:var(--equal);}
.top{background:#fb7185;}

.history::-webkit-scrollbar{
  height:4px;
}
.history::-webkit-scrollbar-track{
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}
.history::-webkit-scrollbar-thumb{
  background:var(--op);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="calc">

<div class="topbar">
  <span class="nexus-title">Calc Pro</span>
  <span class="current-time" id="currentTime">--:--:--</span>
  <div class="top-actions">
    <button id="soundBtn" onclick="toggleSound()">🔊</button>
    <button id="themeBtn" onclick="toggleTheme()">🌙</button>
    <button id="clearHistoryBtn" onclick="clearHistory()">🗑</button>
  </div>
</div>

<div id="display" class="display">0</div>

<div class="divider"></div>

<div id="history" class="history"></div>

<div class="divider"></div>

<div class="buttons">

<button class="top" onclick="clearAll()">AC</button>
<button onclick="memoryClear()">MC</button>
<button onclick="memoryRecall()">MR</button>
<button onclick="memoryAdd()">M+</button>
<button onclick="memorySub()">M-</button>

<button onclick="inputNumber(7)">7</button>
<button onclick="inputNumber(8)">8</button>
<button onclick="inputNumber(9)">9</button>
<button class="op" onclick="handleOperator('/')">÷</button>
<button onclick="handlePercent()">%</button>

<button onclick="inputNumber(4)">4</button>
<button onclick="inputNumber(5)">5</button>
<button onclick="inputNumber(6)">6</button>
<button class="op" onclick="handleOperator('*')">×</button>
<button onclick="sqrt()">√</button>

<button onclick="inputNumber(1)">1</button>
<button onclick="inputNumber(2)">2</button>
<button onclick="inputNumber(3)">3</button>
<button class="op" onclick="handleOperator('-')">−</button>
<button onclick="invert()">±</button>

<button onclick="inputNumber(0)">0</button>
<button onclick="inputDot()">,</button>
<button onclick="backspace()">⌫</button>
<button class="op" onclick="handleOperator('+')">+</button>
<button class="equal" onclick="handleEqual()">=</button>

</div>
</div>

<script>
const display = document.getElementById("display")
const historyEl = document.getElementById("history")

// Armazenamento interno: tudo como número (float)
let currentValue = 0       // valor atual
let previousValue = null   // valor anterior para operação
let currentOperator = null  // operador pendente
let waitingForOperand = false  // se true, aguarda próximo número
let memory = 0
let sound = true

// Controle de digitação: string pura sem formatação (apenas dígitos e vírgula)
let inputString = "0"       // string que o usuário está digitando (ex: "1500,20")
let hasDecimal = false      // se a string atual tem vírgula

// Flags para exibição
let isResultDisplayed = false

// Referências dos botões
const soundBtn = document.getElementById("soundBtn")
const themeBtn = document.getElementById("themeBtn")
const clearHistoryBtn = document.getElementById("clearHistoryBtn")

// Função para formatar número com separadores de milhar (ponto) e vírgula decimal
function formatNumberWithThousandSeparator(num) {
  if (isNaN(num)) return "0"
  
  // Arredonda para 2 casas decimais para exibição padrão
  let rounded = Math.round(num * 100) / 100
  let parts = rounded.toFixed(2).split('.')
  let integerPart = parts[0]
  let decimalPart = parts[1]
  
  // Adiciona separadores de milhar na parte inteira
  integerPart = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.')
  
  return integerPart + ',' + decimalPart
}

// Formata a string de entrada (ex: "1500,2" -> "1.500,20")
function formatInputString(str) {
  if (str === "" || str === "0") return "0"
  
  let parts = str.split(',')
  let integerPart = parts[0] || "0"
  let decimalPart = parts[1] || ""
  
  integerPart = integerPart.replace(/\./g, '')
  
  if (decimalPart === "") {
    if (integerPart === "0") return "0"
    let formattedInt = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.')
    return formattedInt
  }
  
  let formattedInt = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.')
  if (decimalPart.length > 2) decimalPart = decimalPart.substring(0, 2)
  if (decimalPart.length === 1) decimalPart += "0"
  return formattedInt + ',' + decimalPart
}

// Atualiza o display com base no inputString ou no currentValue (se resultado)
function updateDisplay() {
  let displayText = ""
  
  if (isResultDisplayed) {
    displayText = formatNumberWithThousandSeparator(currentValue)
  } else {
    if (inputString === "" || inputString === "0") {
      displayText = "0"
    } else {
      displayText = formatInputString(inputString)
    }
  }
  
  display.innerText = displayText
  display.style.fontSize = displayText.length > 12 ? "28px" : "48px"
}

// Converte a string de entrada (ex: "1500,20") para número (float)
function parseInputStringToNumber(str) {
  if (str === "" || str === "0") return 0
  let clean = str.replace(/\./g, '')
  clean = clean.replace(',', '.')
  let num = parseFloat(clean)
  return isNaN(num) ? 0 : num
}

// Reinicia a entrada para um novo número
function setInputFromNumber(num) {
  let str = num.toString()
  if (str.includes('.')) {
    str = str.replace('.', ',')
  }
  inputString = str
  hasDecimal = str.includes(',')
  waitingForOperand = false
  isResultDisplayed = false
  updateDisplay()
}

// Limpa tudo (AC)
function clearAll() {
  currentValue = 0
  previousValue = null
  currentOperator = null
  waitingForOperand = false
  isResultDisplayed = false
  inputString = "0"
  hasDecimal = false
  updateDisplay()
  beep()
}

// Adiciona dígito ao inputString
function inputNumber(num) {
  if (waitingForOperand) {
    inputString = num.toString()
    hasDecimal = false
    waitingForOperand = false
    isResultDisplayed = false
  } else {
    if (inputString.replace(/\./g, '').replace(',', '').length >= 15) return
    
    if (inputString === "0" && !hasDecimal) {
      inputString = num.toString()
    } else {
      inputString += num.toString()
    }
  }
  updateDisplay()
  beep()
}

// Adiciona vírgula decimal
function inputDot() {
  if (waitingForOperand) {
    inputString = "0,"
    hasDecimal = true
    waitingForOperand = false
    isResultDisplayed = false
  } else if (!hasDecimal) {
    inputString += ","
    hasDecimal = true
  }
  updateDisplay()
  beep()
}

// Backspace
function backspace() {
  if (waitingForOperand) return
  if (isResultDisplayed) return
  
  if (inputString.length === 1 || (inputString.length === 2 && inputString.startsWith('0'))) {
    inputString = "0"
    hasDecimal = false
  } else {
    if (inputString.slice(-1) === ',') hasDecimal = false
    inputString = inputString.slice(0, -1)
  }
  updateDisplay()
  beep()
}

// Inverte sinal
function invert() {
  let num = parseInputStringToNumber(inputString)
  num = -num
  setInputFromNumber(num)
  beep()
}

// Raiz quadrada
function sqrt() {
  let num = parseInputStringToNumber(inputString)
  num = Math.sqrt(num)
  setInputFromNumber(num)
  isResultDisplayed = true
  currentValue = num
  beep()
}

// Percentual
function handlePercent() {
  if (previousValue !== null && currentOperator !== null) {
    let currentNum = parseInputStringToNumber(inputString)
    let percentValue = (previousValue * currentNum) / 100
    setInputFromNumber(percentValue)
  } else {
    let currentNum = parseInputStringToNumber(inputString)
    let percentValue = currentNum / 100
    setInputFromNumber(percentValue)
  }
  beep()
}

// Operador (+, -, *, /)
function handleOperator(op) {
  const inputNum = parseInputStringToNumber(inputString)
  
  if (previousValue !== null && currentOperator !== null && !waitingForOperand) {
    let result = 0
    switch (currentOperator) {
      case '+': result = previousValue + inputNum; break
      case '-': result = previousValue - inputNum; break
      case '*': result = previousValue * inputNum; break
      case '/': result = inputNum === 0 ? 0 : previousValue / inputNum; break
    }
    previousValue = result
    currentValue = result
    setInputFromNumber(result)
    isResultDisplayed = true
    addHistory(result)
  } else {
    previousValue = inputNum
  }
  
  currentOperator = op
  waitingForOperand = true
  beep()
}

// Igual
function handleEqual() {
  if (currentOperator === null || waitingForOperand) return
  
  const inputNum = parseInputStringToNumber(inputString)
  let result = 0
  switch (currentOperator) {
    case '+': result = previousValue + inputNum; break
    case '-': result = previousValue - inputNum; break
    case '*': result = previousValue * inputNum; break
    case '/': result = inputNum === 0 ? 0 : previousValue / inputNum; break
  }
  
  result = parseFloat(result.toFixed(10))
  currentValue = result
  setInputFromNumber(result)
  isResultDisplayed = true
  addHistory(result)
  
  previousValue = null
  currentOperator = null
  waitingForOperand = true
  beep()
}

// Memória
function memoryAdd() { memory += parseInputStringToNumber(inputString); beep(); }
function memorySub() { memory -= parseInputStringToNumber(inputString); beep(); }
function memoryRecall() { setInputFromNumber(memory); isResultDisplayed = false; beep(); }
function memoryClear() { memory = 0; beep(); }

// Histórico
function addHistory(value) {
  let list = JSON.parse(localStorage.getItem("calc_history") || "[]")
  let formatted = formatNumberWithThousandSeparator(value)
  list.unshift(formatted)
  list = list.slice(0, 10)
  localStorage.setItem("calc_history", JSON.stringify(list))
  renderHistory()
}

function renderHistory() {
  let list = JSON.parse(localStorage.getItem("calc_history") || "[]")
  historyEl.innerHTML = ""
  if (list.length === 0) {
    let emptyMsg = document.createElement("span")
    emptyMsg.innerText = "Sem histórico"
    emptyMsg.style.opacity = "0.5"
    emptyMsg.style.cursor = "default"
    emptyMsg.onclick = null
    // Aplicar também a cor do botão = para o texto vazio
    emptyMsg.style.background = "#fb923c"
    emptyMsg.style.color = "#0f172a"
    historyEl.appendChild(emptyMsg)
  } else {
    list.forEach((item, index) => {
      let el = document.createElement("span")
      el.innerText = item
      // O CSS já define fundo laranja para todos, e verde para o primeiro (último)
      // Mas como inserimos via JS, a classe 'history span' já aplica.
      // O primeiro filho será destacado por CSS :first-child
      el.onclick = () => {
        let clean = item.replace(/\./g, '').replace(',', '.')
        let num = parseFloat(clean)
        if (!isNaN(num)) {
          setInputFromNumber(num)
          isResultDisplayed = true
          currentValue = num
          updateDisplay()
          beep()
        }
      }
      historyEl.appendChild(el)
    })
  }
}

function clearHistory() {
  localStorage.removeItem("calc_history")
  renderHistory()
  beep()
  clearHistoryBtn.style.background = "#ef4444"
  clearHistoryBtn.style.transform = "scale(0.95)"
  setTimeout(() => {
    clearHistoryBtn.style.background = ""
    clearHistoryBtn.style.transform = ""
  }, 200)
}

// Som
let audioCtx = null
let isAudioInit = false

function initAudio() {
  if (!isAudioInit && sound) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)()
      isAudioInit = true
    } catch(e) { console.log("Áudio não suportado") }
  }
}

function beep() {
  if (!sound) return
  try {
    if (!isAudioInit) initAudio()
    if (audioCtx) {
      const osc = audioCtx.createOscillator()
      const gain = audioCtx.createGain()
      osc.connect(gain)
      gain.connect(audioCtx.destination)
      osc.frequency.value = 800
      gain.gain.value = 0.1
      osc.start()
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1)
      osc.stop(audioCtx.currentTime + 0.1)
      if (audioCtx.state === 'suspended') audioCtx.resume()
    }
  } catch(e) {}
}

function toggleSound() {
  sound = !sound
  if (sound) {
    soundBtn.style.background = "#22c55e"
    soundBtn.style.color = "white"
    soundBtn.classList.add("sound-active")
    if (!isAudioInit) initAudio()
  } else {
    soundBtn.style.background = ""
    soundBtn.style.color = ""
    soundBtn.classList.remove("sound-active")
  }
  soundBtn.style.transform = "scale(0.95)"
  setTimeout(() => { soundBtn.style.transform = "" }, 200)
}

function toggleTheme() {
  document.body.classList.toggle("light")
  if (document.body.classList.contains("light")) {
    themeBtn.style.background = "#eab308"
    themeBtn.style.color = "#0f172a"
    themeBtn.classList.add("theme-active")
  } else {
    themeBtn.style.background = ""
    themeBtn.style.color = ""
    themeBtn.classList.remove("theme-active")
  }
  themeBtn.style.transform = "scale(0.95)"
  setTimeout(() => { themeBtn.style.transform = "" }, 200)
}

// Relógio
function updateClock() {
  const now = new Date()
  const timeString = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`
  document.getElementById("currentTime").textContent = timeString
}

// Inicialização
function init() {
  updateClock()
  setInterval(updateClock, 1000)
  renderHistory()
  clearAll()
  soundBtn.style.background = "#22c55e"
  soundBtn.style.color = "white"
  soundBtn.classList.add("sound-active")
  
  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function() {
      this.style.transform = 'scale(0.95)'
      setTimeout(() => { this.style.transform = '' }, 100)
    })
  })
  
  const enableAudio = () => {
    if (!isAudioInit && sound) initAudio()
    document.removeEventListener('click', enableAudio)
    document.removeEventListener('touchstart', enableAudio)
  }
  document.addEventListener('click', enableAudio)
  document.addEventListener('touchstart', enableAudio)
}

init()
</script>

</body>
</html>
