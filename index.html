<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Calculadora PRO | Com Relógio</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background: linear-gradient(145deg, #0a0f1a 0%, #0c1320 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Orbitron', monospace;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
        animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .calc {
        background: rgba(25, 35, 45, 0.95);
        backdrop-filter: blur(2px);
        border-radius: 48px;
        padding: 24px 20px 28px 20px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* Display do Relógio */
    .clock-display {
        background: linear-gradient(135deg, #0a0e16, #0b101a);
        border-radius: 32px;
        padding: 20px 20px;
        margin-bottom: 18px;
        text-align: center;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 5px 12px rgba(0,0,0,0.2);
        border-bottom: 2px solid #2ecc71;
    }

    #clock {
        font-family: 'Orbitron', 'Courier New', monospace;
        font-size: 3.4rem;
        font-weight: 700;
        letter-spacing: 5px;
        color: #2ecc71;
        text-shadow: 0 0 10px #2ecc7150, 0 0 20px #2ecc7130;
        background: #010101;
        display: inline-block;
        padding: 8px 24px;
        border-radius: 60px;
        width: auto;
        min-width: 280px;
    }

    .clock-status {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .clock-indicator {
        background: #1e2a32;
        padding: 8px 18px;
        border-radius: 60px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #b0e0c0;
    }

    /* Display da Calculadora */
    .screen-main {
        background: #0c0f14;
        border-radius: 36px;
        padding: 20px 24px;
        margin-bottom: 12px;
        box-shadow: inset 0 4px 12px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.05);
        border: 1px solid #2c3e2f;
    }

    #screen {
        font-family: 'Orbitron', 'Courier New', monospace;
        font-size: 3.5rem;
        font-weight: 800;
        text-align: right;
        color: #2ecc71;
        background: transparent;
        letter-spacing: 3px;
        word-wrap: break-word;
        word-break: break-all;
        line-height: 1.2;
        min-height: 95px;
        text-shadow: 0 0 8px #2ecc7140;
    }

    .history-area {
        background: #0a0e14;
        border-radius: 24px;
        padding: 10px 16px;
        margin-top: 6px;
        border: 1px solid #2a3a2a;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
    }

    #history {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        color: #7f8c8d;
        height: 52px;
        overflow-y: auto;
        text-align: right;
        white-space: nowrap;
        overflow-x: auto;
        flex: 1;
    }

    .clear-history-btn {
        background: #e74c3c;
        border: none;
        border-radius: 20px;
        padding: 8px 12px;
        font-size: 0.75rem;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: all 0.12s linear;
        box-shadow: 0 3px 0 #8b1a1a;
        transform: translateY(-1px);
        font-family: 'Inter', monospace;
        white-space: nowrap;
    }

    .clear-history-btn:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #8b1a1a;
    }

    /* Grade de botões */
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-top: 20px;
    }

    button {
        padding: 18px 0;
        border: none;
        border-radius: 28px;
        font-size: 1.5rem;
        font-weight: 600;
        font-family: 'Inter', monospace;
        background: #1e2a30;
        color: #ecf0f1;
        cursor: pointer;
        transition: all 0.12s linear;
        box-shadow: 0 5px 0 #0f151a;
        transform: translateY(-2px);
    }

    button:active {
        transform: translateY(3px);
        box-shadow: 0 1px 0 #0f151a;
    }

    .op { background: #e67e22; box-shadow: 0 5px 0 #b45f1b; }
    .eq { background: #27ae60; box-shadow: 0 5px 0 #1e8449; }
    .clear { background: #e74c3c; box-shadow: 0 5px 0 #c0392b; }
    .special { background: #5d6d7e; box-shadow: 0 5px 0 #3e4a5a; }

    @media (max-width: 480px) {
        .container { max-width: 100%; padding: 0; }
        .calc { padding: 18px 15px 22px; }
        #clock { font-size: 2rem; letter-spacing: 2px; min-width: auto; padding: 6px 12px; }
        #screen { font-size: 2.2rem; min-height: 70px; }
        .grid { gap: 8px; }
        button { padding: 12px 0; font-size: 1.2rem; }
        .clear-history-btn { padding: 6px 10px; font-size: 0.7rem; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="calc">
        <div class="clock-display">
            <div id="clock">--:--:--</div>
            <div class="clock-status">
                <div class="clock-indicator">🕐 Relógio Digital</div>
            </div>
        </div>

        <div class="screen-main">
            <div id="screen">0</div>
        </div>
        <div class="history-area">
            <div id="history"></div>
            <button class="clear-history-btn" id="clearHistoryBtn">🗑️ Limpar</button>
        </div>

        <div class="grid">
            <button class="clear" data-action="clear">AC</button>
            <button class="op" data-op="/">÷</button>
            <button class="op" data-op="*">×</button>
            <button class="op" data-op="-">−</button>
            <button data-val="7">7</button>
            <button data-val="8">8</button>
            <button data-val="9">9</button>
            <button class="op" data-op="+">+</button>
            <button data-val="4">4</button>
            <button data-val="5">5</button>
            <button data-val="6">6</button>
            <button class="eq" data-action="equal">=</button>
            <button data-val="1">1</button>
            <button data-val="2">2</button>
            <button data-val="3">3</button>
            <button class="special" data-val=".">.</button>
            <button data-val="0">0</button>
            <button class="special" data-val="%">%</button>
            <button class="special" data-action="backspace">⌫</button>
            <button class="special" data-action="paren">( )</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== CALCULADORA ====================
        let expression = "";
        const screenElement = document.getElementById('screen');
        const historyElement = document.getElementById('history');

        function updateScreen() {
            let display = expression === "" ? "0" : expression;
            if (display.length > 12) {
                display = display.slice(0, 12);
                expression = display;
            }
            screenElement.innerText = display;
        }

        function appendValue(val) {
            if (expression === "Erro") expression = "";
            if ((expression + val).length <= 12) {
                expression += val;
            }
            updateScreen();
        }

        function addOperator(op) {
            if (expression === "Erro") expression = "";
            const lastChar = expression.slice(-1);
            if (['+', '-', '*', '/', '%'].includes(lastChar)) {
                expression = expression.slice(0, -1) + op;
            } else if (expression !== "") {
                if ((expression + op).length <= 12) expression += op;
            } else if (op === '-') {
                expression = '-';
            }
            updateScreen();
        }

        function clearAll() { 
            expression = ""; 
            updateScreen(); 
        }
        
        function backspace() { 
            if (expression === "Erro") expression = ""; 
            else expression = expression.slice(0, -1); 
            updateScreen(); 
        }
        
        function addParenthesis() {
            if (expression === "Erro") expression = "";
            const openCount = (expression.match(/\(/g) || []).length;
            const closeCount = (expression.match(/\)/g) || []).length;
            const newChar = openCount > closeCount ? ")" : "(";
            if ((expression + newChar).length <= 12) expression += newChar;
            updateScreen();
        }

        function evaluateSafe(expr) {
            let calcExpr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/%/g, '/100');
            try {
                const result = Function('"use strict";return (' + calcExpr + ')')();
                if (isNaN(result) || !isFinite(result)) throw new Error();
                return parseFloat(result.toFixed(10));
            } catch (e) { 
                return NaN; 
            }
        }

        function calculateResult() {
            if (expression === "" || expression === "Erro") {
                expression = "Erro";
                updateScreen();
                setTimeout(() => { if (expression === "Erro") expression = ""; updateScreen(); }, 1000);
                return;
            }
            let finalExpr = expression;
            const lastChar = finalExpr.slice(-1);
            if (['+', '-', '*', '/', '%'].includes(lastChar)) finalExpr = finalExpr.slice(0, -1);
            if (finalExpr === "") finalExpr = "0";
            const result = evaluateSafe(finalExpr);
            if (!isNaN(result)) {
                let resultStr = result.toString();
                if (resultStr.length > 12) resultStr = result.toExponential(6).slice(0, 12);
                const historyEntry = `${expression} = ${resultStr}`;
                historyElement.innerHTML = historyEntry + "<br>" + historyElement.innerHTML;
                if (historyElement.children.length > 12 && historyElement.lastChild) {
                    historyElement.lastChild.remove();
                }
                try { localStorage.setItem('calcHistory', historyElement.innerHTML); } catch(e) {}
                expression = resultStr;
                updateScreen();
            } else {
                expression = "Erro";
                updateScreen();
                setTimeout(() => { if (expression === "Erro") expression = ""; updateScreen(); }, 1200);
            }
        }

        // Função para limpar o histórico
        function clearHistory() {
            historyElement.innerHTML = '';
            try { localStorage.setItem('calcHistory', ''); } catch(e) {}
            // Pequeno feedback visual
            const oldBg = historyElement.style.backgroundColor;
            historyElement.style.backgroundColor = '#1a2a1a';
            setTimeout(() => {
                historyElement.style.backgroundColor = '';
            }, 200);
        }

        // Carregar histórico salvo
        try {
            const savedHistory = localStorage.getItem('calcHistory');
            if (savedHistory && savedHistory !== '') historyElement.innerHTML = savedHistory;
        } catch(e) {}

        // Evento do botão limpar histórico
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        if (clearHistoryBtn) {
            clearHistoryBtn.addEventListener('click', clearHistory);
        }

        // Eventos dos botões da calculadora
        document.querySelectorAll('.grid button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const action = btn.dataset.action;
                const val = btn.dataset.val;
                const op = btn.dataset.op;
                
                if (action === 'clear') clearAll();
                else if (action === 'equal') calculateResult();
                else if (action === 'backspace') backspace();
                else if (action === 'paren') addParenthesis();
                else if (val !== undefined) appendValue(val);
                else if (op !== undefined) addOperator(op);
            });
        });

        // Teclado
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (!isNaN(Number(key)) && key !== ' ') { appendValue(key); e.preventDefault(); }
            else if (key === '+' || key === '-' || key === '*' || key === '/') { addOperator(key); e.preventDefault(); }
            else if (key === 'Enter') { calculateResult(); e.preventDefault(); }
            else if (key === 'Escape') { clearAll(); e.preventDefault(); }
            else if (key === 'Backspace') { backspace(); e.preventDefault(); }
            else if (key === '%') { appendValue('%'); e.preventDefault(); }
            else if (key === '.') { appendValue('.'); e.preventDefault(); }
        });

        updateScreen();

        // ==================== RELÓGIO ====================
        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const clockElement = document.getElementById('clock');
            if (clockElement) clockElement.innerText = `${hours}:${minutes}:${seconds}`;
        }
        
        // Atualizar relógio a cada segundo
        setInterval(updateClock, 1000);
        updateClock();
        
        console.log('✅ Calculador com relógio iniciada!');
    })();
</script>
</body>
</html>
