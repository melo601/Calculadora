<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Nexus Ultra | Smart Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at center, #0c0a1a, #05030c);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 15px;
    }

    .calculator {
      width: 100%;
      max-width: 520px;
      background: rgba(15, 18, 30, 0.85);
      backdrop-filter: blur(25px);
      border-radius: 48px;
      padding: 28px 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding: 0 6px;
    }

    .logo {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #8b7cf0;
      background: rgba(139, 124, 240, 0.15);
      padding: 6px 14px;
      border-radius: 30px;
      font-family: monospace;
    }

    .clock {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: #8b7cf0;
      background: rgba(0, 0, 0, 0.4);
      padding: 4px 14px;
      border-radius: 30px;
      letter-spacing: 1px;
    }

    .sound-btn {
      background: rgba(139, 124, 240, 0.2);
      border: none;
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 0.9rem;
      cursor: pointer;
      color: #8b7cf0;
      transition: all 0.2s;
      margin-left: 8px;
    }
    .sound-btn:active {
      transform: scale(0.95);
    }

    .display {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 36px;
      padding: 20px 22px;
      margin-bottom: 28px;
      border: 1px solid rgba(106, 90, 205, 0.3);
      box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.3);
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .expr-line {
      font-family: 'JetBrains Mono', monospace;
      color: #8e9dbb;
      font-size: 0.75rem;
      text-align: right;
      min-height: 24px;
      word-break: break-word;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(106, 90, 205, 0.2);
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
    }
    .expr-line::-webkit-scrollbar {
      height: 3px;
    }

    .main-line {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: #5ba9ff;
      text-align: right;
      word-break: break-word;
      min-height: 70px;
      margin: 12px 0;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
      line-height: 1.3;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .main-line::-webkit-scrollbar { display: none; }

    .result-line {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      color: #f3a333;
      text-align: right;
      border-top: 1px solid rgba(106, 90, 205, 0.3);
      padding-top: 10px;
      margin-top: 4px;
      min-height: 40px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
    }
    .result-line::-webkit-scrollbar {
      height: 3px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px 0;
      border: none;
      border-radius: 32px;
      font-size: 1.3rem;
      font-weight: 600;
      font-family: 'Inter', system-ui;
      cursor: pointer;
      transition: all 0.08s linear;
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.25);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
    }

    .btn-num {
      background: linear-gradient(145deg, #2d3250, #1b1f38);
      color: white;
      font-size: 1.5rem;
    }

    .btn-op {
      background: linear-gradient(145deg, #6e5fd0, #5a4bc2);
      color: white;
      font-size: 1.6rem;
    }

    .btn-eq {
      background: linear-gradient(145deg, #f3a333, #e67e22);
      color: white;
      font-size: 1.5rem;
    }

    .btn-clear {
      background: linear-gradient(145deg, #e5534b, #c0392b);
      color: white;
    }

    .btn-special {
      background: linear-gradient(145deg, #2f415a, #1e2f44);
      color: #c4bbff;
    }

    .btn-backspace {
      background: linear-gradient(145deg, #4a5568, #2d3748);
      color: white;
      font-size: 1.3rem;
    }

    @media (max-width: 480px) {
      .calculator { padding: 20px 16px; border-radius: 42px; }
      .main-line { font-size: 1.3rem; min-height: 50px; }
      button { padding: 14px 0; font-size: 1rem; }
      .btn-num { font-size: 1.2rem; }
      .btn-op { font-size: 1.3rem; }
      .result-line { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="header">
    <span class="logo">⚡ NEXUS PRO</span>
    <div style="display: flex; align-items: center; gap: 8px;">
      <span class="clock" id="clock">00:00</span>
      <button class="sound-btn" id="soundToggleBtn" onclick="toggleSound()">🔊</button>
    </div>
  </div>

  <div class="display">
    <div class="expr-line" id="exprLine"></div>
    <div class="main-line" id="mainLine">0</div>
    <div class="result-line" id="resultLine"></div>
  </div>

  <div class="buttons">
    <button class="btn-clear" onclick="clearAll()">AC</button>
    <button class="btn-special" onclick="addChar('(')">(</button>
    <button class="btn-special" onclick="addChar(')')">)</button>
    <button class="btn-op" onclick="handleOperator('/')">÷</button>

    <button class="btn-num" onclick="addChar('7')">7</button>
    <button class="btn-num" onclick="addChar('8')">8</button>
    <button class="btn-num" onclick="addChar('9')">9</button>
    <button class="btn-op" onclick="handleOperator('*')">×</button>

    <button class="btn-num" onclick="addChar('4')">4</button>
    <button class="btn-num" onclick="addChar('5')">5</button>
    <button class="btn-num" onclick="addChar('6')">6</button>
    <button class="btn-op" onclick="handleOperator('-')">−</button>

    <button class="btn-num" onclick="addChar('1')">1</button>
    <button class="btn-num" onclick="addChar('2')">2</button>
    <button class="btn-num" onclick="addChar('3')">3</button>
    <button class="btn-op" onclick="handleOperator('+')">+</button>

    <button class="btn-num" onclick="addChar('0')">0</button>
    <button class="btn-num" onclick="addChar('.')">.</button>
    <button class="btn-special" onclick="handlePercent()">%</button>
    <button class="btn-backspace" onclick="backspace()">⌫</button>
    
    <button class="btn-eq" onclick="calculateResult()" style="grid-column: span 2;">=</button>
  </div>
</div>

<script>
  // ========== CALCULADORA COM COMPORTAMENTO DIFERENTE PARA () ==========
  let fullExpression = '';        // Expressão completa
  let currentNumber = '0';        // Número atual sendo digitado
  let firstNumber = null;         // Primeiro número da operação
  let pendingOperator = null;      // Operador pendente
  let waitingForSecond = false;    // Aguardando segundo número
  let lastResult = null;           // Último resultado
  let hasParentheses = false;      // Se a expressão contém parênteses
  
  let soundEnabled = true;
  
  const MAX_MAIN_LINE = 30;
  
  const exprLineEl = document.getElementById('exprLine');
  const mainLineEl = document.getElementById('mainLine');
  const resultLineEl = document.getElementById('resultLine');

  // Som
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  
  function playKeySound() {
    if (!soundEnabled) return;
    try {
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.frequency.value = 880;
      gainNode.gain.value = 0.08;
      oscillator.start();
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.1);
      oscillator.stop(audioContext.currentTime + 0.08);
    } catch(e) {}
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('soundToggleBtn');
    btn.innerText = soundEnabled ? '🔊' : '🔇';
    if (soundEnabled && audioContext.state === 'suspended') {
      audioContext.resume();
    }
    playKeySound();
  }

  function initAudio() {
    document.body.addEventListener('click', () => {
      if (audioContext.state === 'suspended') audioContext.resume();
    }, { once: true });
  }
  initAudio();

  // Avalia expressão
  function evaluateExpression(expr) {
    try {
      let calcExpr = expr.replace(/×/g, '*').replace(/÷/g, '/');
      const result = eval(calcExpr);
      if (result !== undefined && isFinite(result)) {
        return parseFloat(result.toFixed(10));
      }
      return null;
    } catch(e) {
      return null;
    }
  }

  // Verifica se tem parênteses na expressão
  function checkHasParentheses(expr) {
    return expr.includes('(') || expr.includes(')');
  }

  // Calcula operação básica (sem parênteses)
  function performBasicCalculation() {
    if (firstNumber !== null && pendingOperator !== null && currentNumber !== null) {
      const first = parseFloat(firstNumber);
      const second = parseFloat(currentNumber);
      
      if (isNaN(first) || isNaN(second)) return null;
      
      let result;
      switch(pendingOperator) {
        case '+': result = first + second; break;
        case '-': result = first - second; break;
        case '*': result = first * second; break;
        case '/': result = second !== 0 ? first / second : null; break;
        default: return null;
      }
      
      if (result !== null) {
        return parseFloat(result.toFixed(10));
      }
    }
    return null;
  }

  function formatDisplay(expr) {
    return expr.replace(/\*/g, '×').replace(/\//g, '÷');
  }

  function updateDisplay() {
    let mainDisplay = '';
    
    // Se tem parênteses, mostra a expressão completa
    if (hasParentheses || fullExpression) {
      mainDisplay = fullExpression === '' ? '0' : formatDisplay(fullExpression);
    } 
    // Sem parênteses, mostra no formato "primeiro + segundo"
    else if (firstNumber !== null && pendingOperator !== null) {
      if (waitingForSecond) {
        mainDisplay = firstNumber + ' ' + getOpSymbol(pendingOperator);
      } else {
        mainDisplay = firstNumber + ' ' + getOpSymbol(pendingOperator) + ' ' + currentNumber;
      }
    } else if (firstNumber !== null && pendingOperator === null) {
      mainDisplay = firstNumber;
    } else {
      mainDisplay = currentNumber;
    }
    
    // Limita tamanho
    if (mainDisplay.length > MAX_MAIN_LINE) {
      mainDisplay = mainDisplay.slice(0, MAX_MAIN_LINE);
    }
    
    mainLineEl.innerText = mainDisplay;
    mainLineEl.scrollLeft = mainLineEl.scrollWidth;
    
    // Linha superior (histórico)
    if (lastResult !== null) {
      exprLineEl.innerText = '= ' + lastResult;
    } else {
      exprLineEl.innerText = '';
    }
    exprLineEl.scrollLeft = exprLineEl.scrollWidth;
    
    // Linha de resultado
    if (lastResult !== null && fullExpression === '' && !hasParentheses) {
      resultLineEl.innerText = lastResult.toString();
    } else {
      resultLineEl.innerText = '';
    }
  }

  // Adiciona caractere
  function addChar(char) {
    // Se tem parênteses, adiciona diretamente na expressão
    if (hasParentheses || char === '(' || char === ')') {
      if (char === '(' && !hasParentheses) {
        // Salva o estado atual antes de abrir parênteses
        if (firstNumber !== null && pendingOperator !== null) {
          fullExpression = firstNumber + pendingOperator;
          firstNumber = null;
          pendingOperator = null;
          waitingForSecond = false;
        } else if (firstNumber !== null) {
          fullExpression = firstNumber;
          firstNumber = null;
        } else if (currentNumber !== '0') {
          fullExpression = currentNumber;
          currentNumber = '0';
        }
        hasParentheses = true;
      }
      
      fullExpression += char;
      
      // Verifica se fechou todos os parênteses
      const openCount = (fullExpression.match(/\(/g) || []).length;
      const closeCount = (fullExpression.match(/\)/g) || []).length;
      
      if (openCount === closeCount && openCount > 0) {
        // Fechou todos os parênteses, mas só calcula no '='
        hasParentheses = false;
      }
      
      updateDisplay();
      playKeySound();
      return;
    }
    
    // Sem parênteses - modo normal
    if (lastResult !== null && waitingForSecond === false && firstNumber === null) {
      currentNumber = char;
      lastResult = null;
    } else if (waitingForSecond) {
      currentNumber = char;
      waitingForSecond = false;
    } else {
      if (currentNumber === '0' && char !== '.') {
        currentNumber = char;
      } else {
        currentNumber += char;
      }
    }
    updateDisplay();
    playKeySound();
  }

  // Adiciona operador (com cálculo imediato se não tiver parênteses)
  function handleOperator(op) {
    // Se tem expressão com parênteses, adiciona operador na expressão
    if (hasParentheses || fullExpression !== '') {
      fullExpression += op;
      updateDisplay();
      playKeySound();
      return;
    }
    
    // Sem parênteses - cálculo imediato ao clicar no operador
    if (firstNumber !== null && pendingOperator !== null && !waitingForSecond) {
      // Calcula o resultado
      const result = performBasicCalculation();
      if (result !== null) {
        firstNumber = result.toString();
        lastResult = result;
        currentNumber = firstNumber;
        pendingOperator = op;
        waitingForSecond = true;
        updateDisplay();
        playKeySound();
        return;
      }
    }
    
    // Primeiro operador
    if (currentNumber !== null && currentNumber !== '') {
      firstNumber = currentNumber;
      pendingOperator = op;
      waitingForSecond = true;
      currentNumber = '0';
      updateDisplay();
      playKeySound();
    }
  }

  // Porcentagem
  function handlePercent() {
    if (hasParentheses || fullExpression !== '') {
      fullExpression += '%';
      updateDisplay();
      playKeySound();
      return;
    }
    
    if (firstNumber !== null && pendingOperator !== null && !waitingForSecond) {
      const first = parseFloat(firstNumber);
      const percentValue = parseFloat(currentNumber);
      if (!isNaN(first) && !isNaN(percentValue)) {
        let result;
        switch(pendingOperator) {
          case '+': result = first + (first * percentValue / 100); break;
          case '-': result = first - (first * percentValue / 100); break;
          case '*': result = first * (percentValue / 100); break;
          case '/': result = first / (percentValue / 100); break;
          default: result = percentValue / 100;
        }
        result = parseFloat(result.toFixed(10));
        
        firstNumber = result.toString();
        lastResult = result;
        currentNumber = firstNumber;
        waitingForSecond = true;
        pendingOperator = null;
        updateDisplay();
        playKeySound();
        return;
      }
    }
    
    const num = parseFloat(currentNumber);
    if (!isNaN(num)) {
      currentNumber = (num / 100).toString();
      if (firstNumber === null) {
        firstNumber = currentNumber;
        lastResult = parseFloat(currentNumber);
      }
      updateDisplay();
      playKeySound();
    }
  }

  // Backspace
  function backspace() {
    if (hasParentheses || fullExpression !== '') {
      if (fullExpression.length > 0) {
        fullExpression = fullExpression.slice(0, -1);
      }
      if (fullExpression === '') {
        hasParentheses = false;
        currentNumber = '0';
        firstNumber = null;
        pendingOperator = null;
        waitingForSecond = false;
      }
      updateDisplay();
      playKeySound();
      return;
    }
    
    if (waitingForSecond) {
      if (firstNumber !== null) {
        currentNumber = firstNumber;
        firstNumber = null;
        pendingOperator = null;
        waitingForSecond = false;
        lastResult = null;
      }
    } else if (currentNumber.length > 1) {
      currentNumber = currentNumber.slice(0, -1);
    } else {
      currentNumber = '0';
    }
    updateDisplay();
    playKeySound();
  }

  // Limpar tudo
  function clearAll() {
    fullExpression = '';
    currentNumber = '0';
    firstNumber = null;
    pendingOperator = null;
    waitingForSecond = false;
    lastResult = null;
    hasParentheses = false;
    updateDisplay();
    playKeySound();
  }

  // Botão = (calcula resultado)
  function calculateResult() {
    // Se tem expressão com parênteses
    if (fullExpression !== '') {
      const result = evaluateExpression(fullExpression);
      if (result !== null) {
        lastResult = result;
        exprLineEl.innerText = formatDisplay(fullExpression) + ' = ' + result;
        resultLineEl.innerText = result.toString();
        fullExpression = '';
        hasParentheses = false;
        currentNumber = result.toString();
        firstNumber = result.toString();
        updateDisplay();
      } else {
        mainLineEl.innerText = 'Erro';
        setTimeout(() => updateDisplay(), 1200);
      }
      playKeySound();
      return;
    }
    
    // Sem parênteses
    if (firstNumber !== null && pendingOperator !== null && !waitingForSecond) {
      const result = performBasicCalculation();
      if (result !== null) {
        lastResult = result;
        firstNumber = result.toString();
        currentNumber = firstNumber;
        pendingOperator = null;
        waitingForSecond = false;
        exprLineEl.innerText = lastResult.toString();
        resultLineEl.innerText = lastResult.toString();
        updateDisplay();
      } else {
        mainLineEl.innerText = 'Erro';
        setTimeout(() => updateDisplay(), 1200);
      }
    } else if (lastResult !== null) {
      resultLineEl.innerText = lastResult.toString();
    }
    playKeySound();
  }

  function getOpSymbol(op) {
    const symbols = { '+': '+', '-': '-', '*': '×', '/': '÷' };
    return symbols[op] || op;
  }

  // ========== TECLADO ==========
  document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (/[0-9]/.test(key)) addChar(key);
    if (key === '+') handleOperator('+');
    if (key === '-') handleOperator('-');
    if (key === '*') handleOperator('*');
    if (key === '/') handleOperator('/');
    if (key === '.') addChar('.');
    if (key === '(') addChar('(');
    if (key === ')') addChar(')');
    if (key === '%') handlePercent();
    if (key === 'Backspace') backspace();
    if (key === 'Escape') clearAll();
    if (key === 'Enter') calculateResult();
    e.preventDefault();
  });

  // ========== RELÓGIO ==========
  function updateClock() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('clock').innerText = `${hours}:${minutes}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Inicialização
  updateDisplay();
</script>

</body>
</html>
